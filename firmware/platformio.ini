; =====================================================
; Custo Certo - PlatformIO
; =====================================================
; As credenciais (Wi-Fi e URL do servidor) ficam em "secrets.ini",
; que é ignorado pelo Git. Copie "secrets.ini.example" para
; "secrets.ini" e preencha antes de compilar.
;
;   pio run -e dev  -t upload   → aponta para o IP local
;   pio run -e prod -t upload   → aponta para o Render

[platformio]
extra_configs = secrets.ini

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    bogde/HX711@^0.7.5

build_flags =
    -DWIFI_SSID=\"${secrets.wifi_ssid}\"
    -DWIFI_PASS=\"${secrets.wifi_pass}\"
    -DSERVER_URL=\"${secrets.server_url_prod}\"

[env:dev]
extends = env:esp32dev
build_flags =
    -DWIFI_SSID=\"${secrets.wifi_ssid}\"
    -DWIFI_PASS=\"${secrets.wifi_pass}\"
    -DSERVER_URL=\"${secrets.server_url_dev}\"

[env:prod]
extends = env:esp32dev
build_flags =
    -DWIFI_SSID=\"${secrets.wifi_ssid}\"
    -DWIFI_PASS=\"${secrets.wifi_pass}\"
    -DSERVER_URL=\"${secrets.server_url_prod}\"
